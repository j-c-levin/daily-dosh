name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-2' }}
  STACK_NAME: daily-dosh

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run API tests
        working-directory: api
        run: npm test

      - name: Run web tests
        working-directory: web
        run: npm test

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # 1. Build + deploy the backend and the (empty) site bucket / CDN.
      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --region "$AWS_REGION" \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              MonzoClientId=${{ secrets.MONZO_CLIENT_ID }} \
              MonzoClientSecret=${{ secrets.MONZO_CLIENT_SECRET }}

      # 2. Read the stack outputs we need for the frontend build + upload.
      - name: Read stack outputs
        run: |
          out() {
            aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text
          }
          API_URL="$(out ApiUrl)"
          echo "VITE_API_BASE=${API_URL%/}" >> "$GITHUB_ENV"
          echo "SITE_BUCKET=$(out SiteBucketName)" >> "$GITHUB_ENV"
          echo "DISTRIBUTION_ID=$(out DistributionId)" >> "$GITHUB_ENV"
          echo "SITE_URL=$(out SiteUrl)" >> "$GITHUB_ENV"

      # 3. Build the frontend pointed at the live API, publish, bust the cache.
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Publish to S3
        run: aws s3 sync web/dist "s3://$SITE_BUCKET" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" --paths '/*'

      - name: Summary
        run: |
          echo "### Daily Dosh deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "Site: $SITE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Register **$SITE_URL/oauth/redirect** as a redirect URI in your Monzo client." >> "$GITHUB_STEP_SUMMARY"
